name: Setup Rust
description: Install toolchain from rust-toolchain.toml and cache dependencies. The caller MUST run actions/checkout@v4 first — a local composite action's files are unavailable until the repo is checked out, so this action cannot check out for you.

inputs:
  install-nextest:
    description: Install cargo-nextest for faster parallel test execution
    required: false
    default: "false"

runs:
  using: composite
  steps:
    - uses: actions-rust-lang/setup-rust-toolchain@v1

    - uses: Swatinem/rust-cache@v2
      with:
        shared-key: v1

    - if: inputs.install-nextest == 'true'
      uses: taiki-e/install-action@nextest
