name: Security

on:
  pull_request:
  push:
    branches: [main]
  schedule:
    - cron: "0 6 * * 1"

permissions:
  contents: read

jobs:
  dependency-review:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    steps:
      - uses: actions/checkout@v4
        # Requires GitHub's Dependency Graph (repo Settings → Code security).
        # Until that's enabled the action errors ("not supported on this
        # repository"); keep it non-blocking so it doesn't gate merges, and it
        # starts doing real work automatically once the setting is on. cargo-audit
        # + cargo-deny already cover advisories/licenses in the meantime.
      - uses: actions/dependency-review-action@v4
        continue-on-error: true

  cargo-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-rust
      - uses: taiki-e/install-action@cargo-audit
        # Ignore advisories on lockfile-only crates we never compile (rationale in
        # deny.toml): rsa (RUSTSEC-2023-0071, via unused sqlx-mysql) and
        # quinn-proto (RUSTSEC-2026-0185, via unused reqwest http3).
      - run: cargo audit --ignore RUSTSEC-2023-0071 --ignore RUSTSEC-2026-0185

  cargo-deny:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-rust
      - uses: EmbarkStudios/cargo-deny-action@v2
        with:
          command: check
