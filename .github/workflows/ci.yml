name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  rust:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: inkwell
          POSTGRES_PASSWORD: inkwell
          POSTGRES_DB: inkwell_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U inkwell -d inkwell_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo fmt --check
      - run: cargo clippy --all-targets --all-features -- -D warnings
      - run: cargo test --all
        env:
          INKWELL_REQUIRE_DB_TESTS: "1"
          DATABASE_URL: postgres://inkwell:inkwell@localhost:5432/inkwell_test
      - run: cargo build --release --bin inkwell
