name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  fmt:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-rust
      - run: cargo fmt --all -- --check

  clippy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-rust
      - run: cargo clippy --all-targets --all-features --locked -- -D warnings

  test-fast:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-rust
        with:
          install-nextest: "true"
      - run: |
          cargo nextest run --locked --profile ci-fast --lib
          cargo nextest run --locked --profile ci-fast \
            --test domain_contract \
            --test rendering_contract \
            --test clap_cli_contract \
            --test view_layout_contract \
            --test security_headers_contract

  test-integration:
    runs-on: ubuntu-latest
    services:
      postgres:
        # pgvector image (matches docker-compose) so migration 0009's
        # `CREATE EXTENSION vector` resolves; plain postgres lacks the extension.
        # pgvector tracks pg17 (no pg18 tag yet). Pinned by immutable digest
        # (linux/amd64, the ubuntu-latest runner arch) for supply-chain
        # reproducibility; refresh alongside the pg17 tag when it moves.
        image: pgvector/pgvector:pg17@sha256:3226977dafcdf8f8a8079c8e31763dab1d7e52a8c7e008fc04bc33234fce45bb
        env:
          POSTGRES_USER: inkwell
          POSTGRES_PASSWORD: inkwell
          POSTGRES_DB: inkwell_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U inkwell -d inkwell_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-rust
      - id: postgres
        uses: ./.github/actions/postgres-pgvector
      - run: cargo test --all --locked
        env:
          INKWELL_REQUIRE_DB_TESTS: "1"
          DATABASE_URL: ${{ steps.postgres.outputs.database_url }}

  build-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-rust
      - run: cargo build --release --bin inkwell --locked

  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: docker build -t inkwell:ci .
