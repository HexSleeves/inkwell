name: Release

on:
  push:
    tags:
      - "v*.*.*"

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  verify:
    runs-on: ubuntu-latest
    permissions: {}
    services:
      postgres:
        image: pgvector/pgvector:pg17@sha256:da864cc9983d6a346c39c55c8c5250d752a9b573bbac06b1c3ad5d72f20f5be6
        env:
          POSTGRES_USER: inkwell
          POSTGRES_PASSWORD: inkwell
          POSTGRES_DB: inkwell_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U inkwell -d inkwell_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v7

      - uses: ./.github/actions/setup-rust

      - name: Formatting
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --all-targets --all-features --locked -- -D warnings

      - id: postgres
        uses: ./.github/actions/postgres-pgvector

      - name: Tests (includes migration smoke)
        run: cargo test --all --locked
        env:
          INKWELL_REQUIRE_DB_TESTS: "1"
          DATABASE_URL: ${{ steps.postgres.outputs.database_url }}

      - name: Release build smoke
        run: cargo build --release --bin inkwell --locked

      - name: Docker build smoke
        run: docker build -t inkwell:release-verify .

  build-and-push:
    needs: verify
    runs-on: ubuntu-latest
    permissions:
      packages: write
    steps:
      - uses: actions/checkout@v7

      - uses: ./.github/actions/setup-rust

      - name: Build release binary
        run: cargo build --release --bin inkwell --locked

      - name: Package release binary
        run: |
          strip target/release/inkwell
          tar -czf "inkwell-x86_64-unknown-linux-gnu.tar.gz" -C target/release inkwell
          sha256sum "inkwell-x86_64-unknown-linux-gnu.tar.gz" > "inkwell-x86_64-unknown-linux-gnu.tar.gz.sha256"

      - name: Upload release artifacts
        uses: actions/upload-artifact@v7
        with:
          name: release-assets
          path: |
            inkwell-x86_64-unknown-linux-gnu.tar.gz
            inkwell-x86_64-unknown-linux-gnu.tar.gz.sha256

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=latest,enable=${{ !contains(github.ref_name, '-') }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  github-release:
    needs: build-and-push
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Download release artifacts
        uses: actions/download-artifact@v8
        with:
          name: release-assets
          path: dist

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          files: |
            dist/inkwell-x86_64-unknown-linux-gnu.tar.gz
            dist/inkwell-x86_64-unknown-linux-gnu.tar.gz.sha256
          generate_release_notes: true
