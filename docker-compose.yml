services:
  db:
    # pgvector image from P0 so the one-command quickstart never breaks when the
    # P3 semantic layer adds embeddings. pgvector tracks pg17 (no pg18 tag yet);
    # this steps the dev DB major 18 -> 17, so reset the `inkwell-pgdata` volume
    # if upgrading an existing local stack (`docker compose down -v`).
    image: pgvector/pgvector:pg17
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-inkwell}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-inkwell}
      POSTGRES_DB: ${POSTGRES_DB:-inkwell}
    volumes:
      - inkwell-pgdata:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-inkwell} -d ${POSTGRES_DB:-inkwell}",
        ]
      interval: 5s
      timeout: 5s
      retries: 10
    ports:
      - "${POSTGRES_PORT:-5433}:5432"

  app:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-inkwell}:${POSTGRES_PASSWORD:-inkwell}@db:5432/${POSTGRES_DB:-inkwell}
      PORT: "3000"
      HOST: 0.0.0.0
      INKWELL_API_KEY: "${INKWELL_API_KEY:?Set INKWELL_API_KEY in your shell or .env before running docker compose.}"
      # Optional MCP credential for the AI walkthrough (docs/QUICKSTART.md). Left
      # empty by default — the demo browses fine without it; set it (in your
      # shell or .env) to a non-empty value to enable the `inkwell mcp` server.
      INKWELL_MCP_KEY: ${INKWELL_MCP_KEY:-}
      INKWELL_SITE_URL: ${INKWELL_SITE_URL:-http://localhost:3000}
      # Optional AI providers. Left empty by default so the demo runs with the
      # deterministic mock embedder and the "AI not configured" /ask response.
      # Set them (shell or .env) to use real Voyage embeddings + Claude answers.
      VOYAGE_API_KEY: ${VOYAGE_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
    depends_on:
      db:
        condition: service_healthy
    # migrate -> seed -> serve: seed plants the bundled sample vault as published
    # notes, but only when the garden is empty, so restarts neither duplicate the
    # demo nor clobber your own content.
    command: sh -c 'inkwell db migrate && inkwell seed /app/examples/garden && inkwell serve'
    ports:
      - "${PORT:-3000}:3000"

volumes:
  inkwell-pgdata:
