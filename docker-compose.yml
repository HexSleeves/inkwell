services:
  db:
    image: postgres:18-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-inkwell}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-inkwell}
      POSTGRES_DB: ${POSTGRES_DB:-inkwell}
    volumes:
      - inkwell-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-inkwell} -d ${POSTGRES_DB:-inkwell}']
      interval: 5s
      timeout: 5s
      retries: 10
    ports:
      - '${POSTGRES_PORT:-5432}:5432'

  app:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-inkwell}:${POSTGRES_PASSWORD:-inkwell}@db:5432/${POSTGRES_DB:-inkwell}
      PORT: '3000'
      HOST: 0.0.0.0
      INKWELL_API_KEY: '${INKWELL_API_KEY:?Set INKWELL_API_KEY in your shell or .env before running docker compose.}'
      INKWELL_SITE_URL: ${INKWELL_SITE_URL:-http://localhost:3000}
    depends_on:
      db:
        condition: service_healthy
    command: sh -c 'inkwell db migrate && inkwell serve'
    ports:
      - '${PORT:-3000}:3000'

volumes:
  inkwell-pgdata:
